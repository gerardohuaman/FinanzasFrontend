<div class="dialog-container">

    <!-- Según acción (registrar o editar) -->
    <div class="dialog-header">
        <div class="dialog-title">
            <mat-icon>edit</mat-icon>
            <h2>{{ !modoEdicion ? 'Nuevo vehiculo' : 'Editar vehiculo' }}</h2>
        </div>
    </div>

    <form [formGroup]="form">
        <div class="dialog-content">
            <div class="form-row">
                <mat-form-field appearance="outline" class="half">
                    <mat-label>Marca</mat-label>
                    <input matInput formControlName="marca" placeholder="Toyota">
                </mat-form-field>

                <mat-form-field appearance="outline" class="half">
                    <mat-label>Modelo</mat-label>
                    <input matInput formControlName="modelo" placeholder="Hilux 4x4 D/C">
                </mat-form-field>
            </div>
            <div class="form-row">
                <mat-form-field appearance="outline" class="half">
                    <mat-label>Moneda</mat-label>
                    <mat-select formControlName="id_moneda">
                        <mat-option *ngFor="let m of monedas" [value]="m.id_moneda">
                            {{ m.codigo_iso }}
                        </mat-option>
                    </mat-select>
                    <mat-error *ngIf="form.get('id_moneda')?.hasError('required')">Requerido</mat-error>
                </mat-form-field>
            </div>
            <mat-form-field appearance="outline" class="full">
                <mat-label>Precio</mat-label>
                <input matInput type="number" formControlName="precio_venta" placeholder="45000.00">
                <mat-error *ngIf="form.get('precio')?.hasError('required')">Requerido</mat-error>
            </mat-form-field>
        </div>

        <div class="dialog-actions">
            <button mat-stroked-button type="button" class="btn-cancelar" (click)="cancelar()">Cancelar</button>
            <button mat-flat-button type="button" class="btn-confirmar" (click)="confirmar()">
                {{ modoEdicion ? 'Guardar Cambios' : 'Registrar' }}
            </button>
        </div>
    </form>

</div>
