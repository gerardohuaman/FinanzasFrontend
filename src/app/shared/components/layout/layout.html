<mat-sidenav-container class="dashboard-container">
  
  <!-- SIDEBAR LATERAL (Material Sidenav) -->
  <mat-sidenav #sidenav mode="side" opened class="sidebar">
    
    <div class="logo-section">
      <div class="logo-text">
        <h2>Gestión de Créditos</h2>
        <span>BANCO VEHICULAR</span>
      </div>
    </div>

    <!-- Menú de Navegación con Mat-List -->
    <mat-nav-list class="nav-menu">
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <a mat-list-item routerLink="/clientes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>groups</mat-icon>
        <span matListItemTitle>Clientes y Vehículos</span>
      </a>
      
      <a mat-list-item routerLink="/simulador" routerLinkActive="active-link">
        <mat-icon matListItemIcon>calculate</mat-icon>
        <span matListItemTitle>Simulador de Pagos</span>
      </a>
      
      <a mat-list-item routerLink="/cronograma" routerLinkActive="active-link">
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Cronograma de Pagos</span>
      </a>
    </mat-nav-list>

    <div class="spacer"></div> <!-- Empuja el botón de cerrar sesión hacia abajo -->
    <mat-divider></mat-divider>
    
    <mat-nav-list class="footer-menu">
      <a mat-list-item (click)="cerrarSesion()" class="logout-btn">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Cerrar Sesión</span>
      </a>
    </mat-nav-list>

  </mat-sidenav>

  <!-- ÁREA PRINCIPAL -->
  <mat-sidenav-content class="main-content">
    
    <!-- HEADER SUPERIOR (Material Toolbar) -->
    <mat-toolbar class="top-header">
      <div class="header-title">
        <h1>FinanzaAuto Perú</h1> 
      </div>
      
      <span class="spacer"></span> <!-- Espaciador para tirar el perfil a la derecha -->
      
      <div class="user-profile">
        <img src="assets/avatar.jpg" alt="Avatar" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Asesor&background=0D8ABC&color=fff'">
      </div>
    </mat-toolbar>

    <!-- CONTENIDO DINÁMICO (Las tablas y el simulador cargan aquí) -->
    <section class="content-area">
      <router-outlet></router-outlet>
    </section>

  </mat-sidenav-content>

</mat-sidenav-container>
